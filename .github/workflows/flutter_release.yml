name: Build & Release APK

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.2'
          channel: 'stable'

      - name: Get Dependencies
        run: flutter pub get

      - name: Build Release APK
        run: flutter build apk --release

      - name: Rename APK with version
        run: |
          VERSION=$(grep 'version:' pubspec.yaml | head -1 | awk '{print $2}' | cut -d'+' -f1)
          cp build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/lucifax-cdm-v${VERSION}.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/lucifax-cdm-*.apk

      # Auto-create GitHub Release when a version tag (v*) is pushed
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/lucifax-cdm-*.apk
          generate_release_notes: true
          body: |
            ## 🛡️ Lucifax CDM — Pembaruan Otomatis

            APK rilis terbaru telah di-build secara otomatis.

            ### Cara Update:
            1. Buka aplikasi Lucifax CDM di HP Anda
            2. Notifikasi pembaruan akan muncul secara otomatis
            3. Ketuk "Unduh Sekarang" untuk mengunduh & memasang

            ### Cara Install Manual:
            1. Unduh file `.apk` di bawah ini
            2. Buka file APK di HP Android Anda
            3. Izinkan instalasi dari sumber tidak dikenal jika diminta
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Auto-create release from main branch push (non-tag) — draft release
      - name: Auto-Release from Main Branch
        if: github.ref == 'refs/heads/main' && !startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: auto-build-${{ github.run_number }}
          name: "Auto Build #${{ github.run_number }}"
          draft: false
          prerelease: true
          files: build/app/outputs/flutter-apk/lucifax-cdm-*.apk
          body: |
            ⚡ Build otomatis dari commit `${{ github.sha }}` di branch `main`.
            Ini adalah pre-release yang di-build otomatis oleh CI/CD.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
