name: lucifax_cdm
description: "Lucifax CDM - Anti-Theft & Remote Device Management"
publish_to: 'none'
version: 1.0.1+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^2.27.0
  firebase_auth: ^4.17.4
  cloud_firestore: ^4.15.5
  firebase_messaging: ^14.7.15
  firebase_storage: ^11.6.6

  # Location
  geolocator: ^11.0.0
  geocoding: ^3.0.0
  google_maps_flutter: ^2.6.0

  # Device & System
  device_info_plus: ^10.1.0
  battery_plus: ^6.0.1
  connectivity_plus: ^6.0.3
  permission_handler: ^11.3.0

  # Background
  flutter_background_service: ^5.0.5
  flutter_local_notifications: ^17.1.0

  # Networking & HTTP
  http: ^1.2.0
  url_launcher: ^6.2.5
  package_info_plus: ^8.0.0

  # Security
  flutter_secure_storage: ^9.0.0

  # Audio
  audioplayers: ^5.2.1

  # Camera
  camera: ^0.10.5+9

  # UI
  flutter_riverpod: ^2.5.1
  go_router: ^13.2.0
  google_fonts: ^6.1.0
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1
  flutter_animate: ^4.5.0
  intl: ^0.19.0
  uuid: ^4.3.3
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/sounds/
    - assets/images/
